name: synaptiq
description: "Nirmala AI Assistant - Context-aware chat powered by OpenRouter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  flutter_riverpod: ^2.5.1
  fluentui_system_icons: ^1.1.261
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_svg: ^2.0.10+1

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2

  equatable: ^2.0.7
  go_router: ^14.6.2
  dio: ^5.7.0
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.8
  hive_generator: any

flutter:
  uses-material-design: true
  assets:
    - assets/
